name: CI - Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      # 忽略清单文件的自动提交，防止触发 CI 的无限循环
      - 'k8s/kustomization.yaml' 
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: arc-runner-set # 使用 GitHub 免费的标准机器即可
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    needs: build-and-push
    runs-on: arc-runner-set
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag with Kustomize
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          FULL_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          # 修改 2: 进入 k8s 目录
          cd k8s 
          kustomize edit set image frontend=${FULL_IMAGE}:${SHORT_SHA} # 瞄准 frontend 靶子
          
      - name: Commit and push
        run: |
          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add k8s/kustomization.yaml # 修改 3：提交 k8s 目录的变动
          if ! git diff --staged --quiet; then
            git commit -m "ci: update frontend image tag to $(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi